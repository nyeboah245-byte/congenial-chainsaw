<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catch the Dot</title>
    <style>
        body {
            margin: 0;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background: #ffffff;
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const player = { x: 180, y: 180, size: 30, speed: 4 };
        const target = { x: 0, y: 0, size: 20 };
        let score = 0;
        const keys = {};

        // place the target at a random location inside the canvas
        function resetTarget() {
            target.x = Math.random() * (canvas.width - target.size);
            target.y = Math.random() * (canvas.height - target.size);
        }

        // handle keyboard presses
        window.addEventListener('keydown', e => { keys[e.key] = true; });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        function update() {
            // move player based on arrow keys
            if (keys.ArrowUp)    player.y -= player.speed;
            if (keys.ArrowDown)  player.y += player.speed;
            if (keys.ArrowLeft)  player.x -= player.speed;
            if (keys.ArrowRight) player.x += player.speed;

            // keep player inside canvas bounds
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            // check collision with the target (simple AABB test)
            if (player.x < target.x + target.size &&
                player.x + player.size > target.x &&
                player.y < target.y + target.size &&
                player.y + player.size > target.y) {
                score++;
                resetTarget();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // draw player (blue square)
            ctx.fillStyle = '#0066ff';
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // draw target (red circle)
            ctx.fillStyle = '#ff3300';
            ctx.beginPath();
            ctx.arc(target.x + target.size / 2, target.y + target.size / 2,
                    target.size / 2, 0, Math.PI * 2);
            ctx.fill();

            // draw score
            ctx.fillStyle = '#000';
            ctx.font = '16px Arial';
            ctx.fillText('Score: ' + score, 10, 20);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // initialise
        resetTarget();
        requestAnimationFrame(loop);
    </script>
</body>
</html>

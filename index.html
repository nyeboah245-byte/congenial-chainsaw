<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake – Simple Canvas Game</title>
<style>
  body { margin:0; font-family:Arial,Helvetica,sans-serif; background:#222; color:#fff; text-align:center; }
  canvas { background:#111; display:block; margin:20px auto; }
  #score { font-size:1.2em; }
</style>
</head>
<body>
<h1>Snake</h1>
<canvas id="gameCanvas" width="400" height="400"></canvas>
<div id="score">Score: 0</div>

<script>
/* ------------------ Configuration ------------------ */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const cellSize = 20;                     // size of one grid cell in pixels
const canvasSize = canvas.width;         // assume square canvas
const gridCount = canvasSize / cellSize; // number of cells per side
const initialSpeed = 150;                // ms per frame

/* ------------------ Game State ------------------ */
let snake = [{x:5, y:5}];                // array of segments, head first
let direction = {x:1, y:0};              // moving right initially
let food = null;
let score = 0;
let gameInterval = null;

/* ------------------ Helper Functions ------------------ */
function randomCell() {
  return {
    x: Math.floor(Math.random() * gridCount),
    y: Math.floor(Math.random() * gridCount)
  };
}

function placeFood() {
  let newFood;
  do {
    newFood = randomCell();
  } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
  food = newFood;
}

function drawCell(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
}

function drawSnake() {
  snake.forEach((seg, index) => {
    drawCell(seg.x, seg.y, index === 0 ? '#0f0' : '#0a0');
  });
}

function drawFood() {
  drawCell(food.x, food.y, '#f00');
}

function update() {
  // calculate new head position
  const newHead = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // wrap around edges
  if (newHead.x < 0) newHead.x = gridCount - 1;
  if (newHead.x >= gridCount) newHead.x = 0;
  if (newHead.y < 0) newHead.y = gridCount - 1;
  if (newHead.y >= gridCount) newHead.y = 0;

  // check collision with self
  if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
    clearInterval(gameInterval);
    alert('Game over! Your score: ' + score);
    return;
  }

  // add new head
  snake.unshift(newHead);

  // check food
  if (newHead.x === food.x && newHead.y === food.y) {
    score += 1;
    document.getElementById('score').textContent = 'Score: ' + score;
    placeFood();
  } else {
    // remove tail
    snake.pop();
  }
}

function render() {
  ctx.clearRect(0, 0, canvasSize, canvasSize);
  drawFood();
  drawSnake();
}

function gameLoop() {
  update();
  render();
}

/* ------------------ Input Handling ------------------ */
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp':
      if (direction.y !== 1) direction = {x:0, y:-1};
      break;
    case 'ArrowDown':
      if (direction.y !== -1) direction = {x:0, y:1};
      break;
    case 'ArrowLeft':
      if (direction.x !== 1) direction = {x:-1, y:0};
      break;
    case 'ArrowRight':
      if (direction.x !== -1) direction = {x:1, y:0};
      break;
  }
});

/* ------------------ Start Game ------------------ */
placeFood();
gameInterval = setInterval(gameLoop, initialSpeed);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch the Kente</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background:#f0f0f0; }
#gameCanvas { background:#fff; display:block; margin:auto; border:2px solid #333; }
#scoreBoard { text-align:center; margin-top:10px; font-size:1.2em; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<div id="scoreBoard">Score: 0</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreBoard = document.getElementById('scoreBoard');
const basket = { x: canvas.width/2 - 30, y: canvas.height - 30, width: 60, height: 20 };
const basketSpeed = 7;
const kenteColors = ['#FF5733','#33FF57','#3357FF','#FF33A1','#A133FF','#33FFF5'];
let kente = { x: 0, y: 0, size: 30, color: '#000', speed: 3, active: false };
let score = 0;
let gameOver = false;
// Utility: random integer between min and max inclusive
function randInt(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
// Spawn a new kente piece
function spawnKente() {
kente.x = randInt(0, canvas.width - kente.size);
kente.y = -kente.size;
kente.color = kenteColors[randInt(0, kenteColors.length-1)];
kente.speed = randInt(2, 5);
kente.active = true;
}
// Draw basket
function drawBasket() {
ctx.fillStyle = '#8B4513';
ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
}
// Draw kente piece
function drawKente() {
if (!kente.active) return;
ctx.fillStyle = kente.color;
ctx.fillRect(kente.x, kente.y, kente.size, kente.size);
}
// Update positions
function update() {
if (gameOver) return;
// Move kente
if (kente.active) {
kente.y += kente.speed;
// Check for catch
if (kente.y + kente.size >= basket.y &&
kente.x + kente.size >= basket.x &&
kente.x <= basket.x + basket.width) {
score++;
scoreBoard.textContent = 'Score: ' + score;
kente.active = false;
spawnKente();
}
// Missed
else if (kente.y > canvas.height) {
gameOver = true;
alert('Game Over! Final score: ' + score);
return;
}
} else {
// No active kente, spawn after a short delay
setTimeout(spawnKente, 800);
}
}
// Render loop
function render() {
ctx.clearRect(0, 0, canvas.width, canvas.height);
drawBasket();
drawKente();
}
// Main loop
function loop() {
update();
render();
requestAnimationFrame(loop);
}
// Keyboard controls
document.addEventListener('keydown', e => {
if (e.key === 'ArrowLeft' && basket.x > 0) basket.x -= basketSpeed;
if (e.key === 'ArrowRight' && basket.x < canvas.width - basket.width) basket.x += basketSpeed;
});
// Start game
spawnKente();
loop();
</script>
</body>
</html>

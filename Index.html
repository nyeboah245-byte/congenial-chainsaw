<!DOCTYPE html>
<html>
<head>
<title>Color Match</title>
<style>
/ Add some basic styling to the game /
table {
border-collapse: collapse;
}
th, td {
border: 1px solid black;
width: 50px;
height: 50px;
}
</style>
</head>
<body>
<h1>Color Match</h1>
<table id="game-grid">
<tr>
<td id="square-1" class="square" style="background-color: red;"></td>
<td id="square-2" class="square" style="background-color: blue;"></td>
<td id="square-3" class="square" style="background-color: green;"></td>
<td id="square-4" class="square" style="background-color: yellow;"></td>
</tr>
<tr>
<td id="square-5" class="square" style="background-color: purple;"></td>
<td id="square-6" class="square" style="background-color: orange;"></td>
<td id="square-7" class="square" style="background-color: pink;"></td>
<td id="square-8" class="square" style="background-color: brown;"></td>
</tr>
<tr>
<td id="square-9" class="square" style="background-color: grey;"></td>
<td id="square-10" class="square" style="background-color: turquoise;"></td>
<td id="square-11" class="square" style="background-color: lavender;"></td>
<td id="square-12" class="square" style="background-color: teal;"></td>
</tr>
<tr>
<td id="square-13" class="square" style="background-color: silver;"></td>
<td id="square-14" class="square" style="background-color: maroon;"></td>
<td id="square-15" class="square" style="background-color: peach;"></td>
<td id="square-16" class="square" style="background-color: aqua;"></td>
</tr>
</table>
<p id="score">Score: 0</p>
<script>
// Get all the squares and the score element
const squares = document.querySelectorAll('.square');
const scoreElement = document.getElementById('score');
// Initialize the score to 0
let score = 0;
// Function to swap two squares
function swapSquares(square1, square2) {
// Get the background colors of the two squares
const color1 = square1.style.backgroundColor;
const color2 = square2.style.backgroundColor;
// Swap the background colors of the two squares
square1.style.backgroundColor = color2;
square2.style.backgroundColor = color1;
}
// Function to check if two squares have the same color
function areSquaresSameColor(square1, square2) {
// Get the background colors of the two squares
const color1 = square1.style.backgroundColor;
const color2 = square2.style.backgroundColor;
// Return true if the two squares have the same color, false otherwise
return color1 === color2;
}
// Function to check if a row or column is full of the same color
function isRowOrColumnFullOfSameColor(rowOrColumn) {
// Get the background color of the first square in the row or column
const color = rowOrColumn[0].style.backgroundColor;
// Check if all squares in the row or column have the same color
for (const square of rowOrColumn) {
if (square.style.backgroundColor !== color) {
return false;
}
}
// Return true if all squares in the row or column have the same color, false otherwise
return true;
}
// Add event listeners to each square to swap them when clicked
squares.forEach((square, index) => {
square.addEventListener('click', () => {
// Get the two squares that were clicked
const square1 = squares[index];
const square2 = squares[index - 4];
// Swap the two squares
swapSquares(square1, square2);
// Check if the two squares have the same color
if (areSquaresSameColor(square1, square2)) {
// If they have the same color, check if the row or column is full of the same color
const rowOrColumn = [square1, square2];
// Check if the row is full of the same color if (areSquaresSameColor(square1, square2)) {
// If they have the same color, check if the row is full of the same color
const rowOrColumn = [square1, square2];
// Check if the row is full of the same color
if (isRowOrColumnFullOfSameColor(rowOrColumn)) {
// If the row is full of the same color, increment the score
score++;
// Update the score element
scoreElement.textContent = Score: ${score};
}
// Check if the column is full of the same color
const column = [square1, square2, squares[index + 4], squares[index + 8]];
if (isRowOrColumnFullOfSameColor(column)) {
// If the column is full of the same color, increment the score
score++;
// Update the score element
scoreElement.textContent = Score: ${score};
}
}
}
});
});
// Start the game with a random color for each square
squares.forEach((square) => {
const randomColor = getRandomColor();
square.style.backgroundColor = randomColor;
});
// Function to get a random color
function getRandomColor() {
const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'orange', 'pink', 'brown', 'grey', 'turquoise', 'lavender', 'teal', 'silver', 'maroon', 'peach', 'aqua'];
return colors[Math.floor(Math.random() * colors.length)];
}
</script>
</body>
</html>
